# External Secrets Operator example — production-safe secret injection
#
# Prerequisites:
# - External Secrets Operator installed
# - SecretStore or ClusterSecretStore configured (Vault, AWS Secrets Manager, etc.)
# - Replace storeRef name and secret keys with your vault path
#
# Apply: kubectl apply -f external-secret.yaml -n taskforge-prod
# The operator will create taskforge-backend-secrets from the external store.
#
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: taskforge-backend-secrets
  labels:
    app: taskforge-backend
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-store  # Replace with your SecretStore name
    kind: SecretStore
  target:
    name: taskforge-backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: taskforge/database  # Replace with your vault path
        property: url
    - secretKey: SECRET_KEY
      remoteRef:
        key: taskforge/database
        property: secret_key
