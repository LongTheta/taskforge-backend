apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskforge-backend
  labels:
    app: taskforge-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskforge-backend
  template:
    metadata:
      labels:
        app: taskforge-backend
    spec:
      containers:
        - name: app
          image: taskforge-backend:PLACEHOLDER_TAG  # Overridden by overlay
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: taskforge-backend-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: taskforge-backend-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: taskforge-backend-secrets
                  key: SECRET_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
