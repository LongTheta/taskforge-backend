apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: taskforge-dev

resources:
  - ../../base

images:
  - name: taskforge-backend
    newName: taskforge-backend
    newTag: "test"  # CI updates to commit SHA

patches:
  - target:
      kind: ConfigMap
      name: taskforge-backend-config
    patch: |-
      - op: replace
        path: /data/LOG_LEVEL
        value: "DEBUG"
