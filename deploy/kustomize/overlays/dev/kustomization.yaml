apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: taskforge-dev

resources:
  - ../../base
  - secret.yaml  # Dev: placeholder secret (LOCAL/DEV only)

images:
  - name: taskforge-backend
    newName: taskforge-backend
    newTag: "test"  # CI updates to commit SHA

patches:
  - path: patch.yaml
    target:
      kind: Deployment
      name: taskforge-backend
  - target:
      kind: ConfigMap
      name: taskforge-backend-config
    patch: |-
      - op: replace
        path: /data/LOG_LEVEL
        value: "DEBUG"
