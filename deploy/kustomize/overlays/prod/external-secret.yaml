# External Secrets Operator — production secret injection (no secrets in Git)
#
# Prerequisites: ESO installed, SecretStore (e.g. vault-store) configured.
# See deploy/external-secrets/README.md
#
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: taskforge-backend-secrets
  labels:
    app: taskforge-backend
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-store  # Replace with your SecretStore name
    kind: SecretStore
  target:
    name: taskforge-backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: taskforge/database  # Replace with your vault path
        property: url
    - secretKey: SECRET_KEY
      remoteRef:
        key: taskforge/database
        property: secret_key
