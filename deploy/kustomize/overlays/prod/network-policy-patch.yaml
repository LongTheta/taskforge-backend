# Prod: Restrict ingress to ingress controller namespace (Zero Trust micro-segmentation)
# Adjust matchLabels to match your cluster:
#   - ingress-nginx: kubernetes.io/metadata.name: ingress-nginx
#   - nginx-ingress: app.kubernetes.io/name: ingress-nginx
#   - Istio: istio-injection: enabled (use podSelector instead)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: taskforge-backend
spec:
  ingress:
    # Allow HTTP (8000) only from ingress controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              # Common labels: kubernetes.io/metadata.name=ingress-nginx
              # Or: app.kubernetes.io/name=ingress-nginx
              # Adjust for your cluster's ingress controller
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
